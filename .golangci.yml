---
version: "2"

run:
  timeout: 3m

linters:
  enable:
    - govet
    - staticcheck
    - ineffassign
    - errcheck
    - gocritic
    - revive
    - misspell
    - gosec
  disable:
    - depguard
  settings:
    revive:
      severity: warning
      rules:
        - name: exported
          disabled: true
    misspell:
      locale: US
    gosec:
      excludes:
        - G306  # Allow file perms set explicitly in controlled scaffolding

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
